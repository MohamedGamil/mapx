name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload coverage to Coveralls
        if: success()
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build WASM grammars
        run: npm run build:wasm

      - name: Build npm package
        run: npm run build:npm

      - name: Verify package contents
        run: npm pack --dry-run

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Init mapx
        run: npx tsx src/main.ts init . --no-agents --no-suggestions --no-mcp-configs

      - name: Scan codebase
        run: npx tsx src/main.ts scan .

      - name: Query with wildcard
        run: npx tsx src/main.ts query '*'

      - name: Search with glob and kind
        run: npx tsx src/main.ts search '*' --kind class --limit 5

      - name: Search with JSON format
        run: npx tsx src/main.ts search '*Service' --format json --limit 3

      - name: Fuzzy fallback test
        run: npx tsx src/main.ts callers 'NonExistentSymbolXYZ123' || true

      - name: Export LLM summary
        run: npx tsx src/main.ts export

      - name: Status check
        run: npx tsx src/main.ts status .

      - name: Cleanup
        run: rm -rf .mapx
